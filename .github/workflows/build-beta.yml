name: Build beta

env:
  SLN_PATH: Source/

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths-ignore:
      - 'README.md'

jobs:
  build-native:
    name: Build native
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: 
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-latest, macos-15-intel]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Build native
        run: cargo build --release --manifest-path native/Cargo.toml --target-dir target/
      - name: Move libraries
        if: ${{ runner.os != 'Windows' }}
        run: |
          NativeDir=Native-${{ runner.os }}-${{ runner.arch }}/
          suffix=${{ runner.os }}-${{ runner.arch }}

          mkdir $NativeDir
          find target/release/ -maxdepth 1 -type f \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) | while read -r file; do
            ext="${file##*.}"
            name="$(basename "$file" ".$ext")"
            mv "$file" "$NativeDir/${name}-${suffix}.$ext"
          done
      - name: Move libraries (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: |
          $NativeDir='Native-${{ runner.os }}-${{ runner.arch }}/'
          $suffix='${{ runner.os }}-${{ runner.arch }}'

          mkdir $NativeDir
          Get-ChildItem -Path "target/release" -File |
            Where-Object { $_.Extension -in ".dll", ".so", ".dylib" } |
            ForEach-Object {
              $newName = "{0}-{1}{2}" -f $_.BaseName, $suffix, $_.Extension
              $destPath = Join-Path $NativeDir $newName
              Move-Item -Path $_.FullName -Destination $destPath -Force
          }          
      - name: Cache binaries
        uses: actions/cache/save@v4
        with:
          path: Native-*/
          key: ${{ runner.os }}-${{ runner.arch }}-build-native-${{ github.sha }}-${{ github.run_id }}
          enableCrossOsArchive: true
          
  build:
    name: Build beta
    runs-on: ubuntu-latest
    needs: build-native
    env:
        GH_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Setup Dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
      
    - name: Install Mod Dependencies
      run: dotnet restore ${{ env.SLN_PATH }}

    - name: Build Mod
      run: dotnet build ${{ env.SLN_PATH }} --configuration Release --no-restore


    - uses: actions/cache@v4
      name: Restore Linux-X64 native libraries
      with:
        path: Native-*/
        key: Linux-X64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: true
    - uses: actions/cache/restore@v4
      name: Restore Linux-ARM64 native libraries
      with:
        path: Native-*/
        key: Linux-ARM64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: true
        
    - uses: actions/cache/restore@v4
      name: Restore Windows-X64 native libraries
      with:
        path: Native-*/
        key: Windows-X64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: true
    - uses: actions/cache/restore@v4
      name: Restore Windows-ARM64 native libraries
      with:
        path: Native-*/
        key: Windows-ARM64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: false # For some reason windows-arm64 caches are not available here

    - uses: actions/cache/restore@v4
      name: Restore macOS-X64 native libraries
      with:
        path: Native-*/
        key: macOS-X64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: true
    - uses: actions/cache/restore@v4
      name: Restore macOS-ARM64 native libraries
      with:
        path: Native-*/
        key: macOS-ARM64-build-native-${{ github.sha }}-${{ github.run_id }}
        enableCrossOsArchive: true
        fail-on-cache-miss: true


    - name: Package files
      run: |
        sed -i "s/<name>\(.*\)<\/name>\$/<name>\1 [Continuous]<\/name>/" About/About.xml
        mkdir -p output/Multiplayer
        mv About/ Assemblies/ AssembliesCustom/ Defs/ Languages/ Textures/ output/Multiplayer
        find . -type d -name "Native*" -exec find {} -type f \;
        mkdir -p output/Multiplayer/AssembliesNative
        mv Native-*/*.{dll,so,dylib} output/Multiplayer/AssembliesNative
        cd output/
        zip -r ../Multiplayer-beta.zip Multiplayer/
        cd ../

    - name: Upload Mod Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Multiplayer-beta
        path: output/
    
    - name: Clean up last release
      continue-on-error: true
      run: |
        gh release delete --cleanup-tag --yes "continuous"
    
    - name: Upload new release
      run: |
        gh release create --target $(git branch --show-current) --title "Continuous" --notes-file ".github/workflows/alpha-notes.md" --draft "continuous"
        gh release upload "continuous" Multiplayer-beta.zip
        gh release edit "continuous" --draft=false
